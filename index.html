<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌面备忘录</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container" id="mainContainer">
    <div class="title-bar" id="titleBar">
      <div class="date-display" id="dateDisplay"></div>
      <div class="window-controls">
        <button class="btn-settings" id="btnSettings" title="设置">&#9881;</button>
        <button class="btn-close" id="btnClose" title="关闭">×</button>
      </div>
    </div>
    
    <div class="memo-content">
      <div class="memo-list" id="memoList"></div>
      <button class="add-btn" id="addBtn">+ 添加备忘</button>
    </div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <span>设置</span>
      <button class="btn-close-settings" id="btnCloseSettings">×</button>
    </div>
    <div class="settings-content">
      <div class="setting-item">
        <label>背景透明度</label>
        <input type="range" id="opacitySlider" min="0.3" max="1" step="0.05" value="0.85">
        <span id="opacityValue">85%</span>
      </div>
      <div class="setting-item">
        <label>窗口置顶</label>
        <input type="checkbox" id="alwaysOnTop" checked>
      </div>
      <div class="setting-item">
        <label>开机自启动</label>
        <input type="checkbox" id="openAtLogin">
      </div>
      <div class="setting-item">
        <label>快捷键（显示/隐藏窗口）</label>
        <div class="shortcut-input-wrapper">
          <input type="text" id="shortcutKey" placeholder="按下快捷键组合..." readonly>
          <button class="btn-reset-shortcut" id="btnResetShortcut" title="重置为默认">↺</button>
        </div>
        <span class="shortcut-hint">点击输入框后按下快捷键组合</span>
      </div>
      <div class="setting-item">
        <button class="btn-trash" id="btnTrash">🗑 垃圾桶</button>
      </div>
      <div class="setting-item">
        <button class="btn-sync" id="btnSync">☁ 云同步</button>
      </div>
      <div class="setting-item">
        <button class="btn-clear-all" id="btnClearAll">清空所有备忘</button>
      </div>
    </div>
  </div>

  <div class="trash-panel" id="trashPanel">
    <div class="trash-header">
      <button class="btn-back" id="btnBackFromTrash">← 返回</button>
      <span>垃圾桶</span>
      <button class="btn-delete-selected" id="btnDeleteSelected" style="display:none;">删除所选</button>
    </div>
    <div class="trash-content" id="trashContent"></div>
    <div class="trash-search-bar">
      <input type="text" id="trashSearchInput" placeholder="搜索备忘录...">
      <button class="btn-clear-search" id="btnClearTrashSearch" title="清除">×</button>
    </div>
  </div>

  <div class="trash-date-panel" id="trashDatePanel">
    <div class="trash-header">
      <button class="btn-back" id="btnBackFromDate">← 返回</button>
      <span id="trashDateTitle"></span>
      <button class="btn-delete-selected" id="btnDeleteSelectedDate" style="display:none;">删除所选</button>
    </div>
    <div class="trash-content" id="trashDateContent"></div>
  </div>

  <div class="sync-panel" id="syncPanel">
    <div class="sync-header">
      <button class="btn-back" id="btnBackFromSync">← 返回</button>
      <span>云同步设置</span>
      <span></span>
    </div>
    <div class="sync-content" id="syncContent">
      <div class="sync-status" id="syncStatus">
        <div class="sync-status-icon">☁</div>
        <div class="sync-status-text" id="syncStatusText">未配置</div>
        <div class="sync-status-email" id="syncStatusEmail"></div>
      </div>
      
      <div class="sync-config-form" id="syncConfigForm">
        <div class="form-group">
          <label>Supabase URL</label>
          <input type="text" id="supabaseUrl" placeholder="https://xxx.supabase.co">
        </div>
        <div class="form-group">
          <label>Anon Key</label>
          <input type="password" id="supabaseAnonKey" placeholder="输入 Anon Key">
        </div>
        <button class="btn-save-config" id="btnSaveSupabaseConfig">保存配置</button>
      </div>
      
      <div class="sync-auth-form" id="syncAuthForm" style="display:none;">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">登录</button>
          <button class="auth-tab" data-tab="register">注册</button>
        </div>
        <div class="auth-content">
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="syncEmail" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="syncPassword" placeholder="输入密码">
          </div>
          <button class="btn-auth" id="btnAuth">登录</button>
        </div>
      </div>
      
      <div class="sync-actions" id="syncActions" style="display:none;">
        <button class="btn-sync-action" id="btnUploadAll">
          <span class="sync-icon">↑</span>
          <span>上传所有数据</span>
        </button>
        <button class="btn-sync-action" id="btnDownloadAll">
          <span class="sync-icon">↓</span>
          <span>下载所有数据</span>
        </button>
        <button class="btn-sync-action danger" id="btnLogout">
          <span class="sync-icon">✕</span>
          <span>退出登录</span>
        </button>
      </div>
      
      <div class="sync-message" id="syncMessage"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
